<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Leaderboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Header -->
<div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white shadow-lg">
  <h1 class="text-3xl font-bold text-center">🏆 Quiz Leaderboard</h1>
  <p class="text-center text-sm mt-1">Assessment Solution</p>
</div>

<!-- Main -->
<div class="max-w-4xl mx-auto mt-8">

  <div class="text-center mb-6">
    <button onclick="startProcess()" 
      class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow">
      Start Processing
    </button>
  </div>

  <div id="status" class="text-center text-gray-600 mb-4"></div>

  <div class="bg-white rounded-xl shadow-lg p-6">
    <table class="w-full text-left">
      <thead>
        <tr class="border-b">
          <th class="p-3">Rank</th>
          <th class="p-3">Participant</th>
          <th class="p-3 text-right">Score</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="mt-6 text-right">
      <span class="text-lg font-semibold">Total Score: </span>
      <span id="total" class="text-2xl font-bold text-blue-600"></span>
    </div>
  </div>

</div>

<script>

const BASE_URL = "https://devapigw.vidalhealthtpa.com/srm-quiz-task";
const REG_NO = "PUT_YOUR_REG_NO_HERE"; // 🔥 CHANGE THIS

const delay = ms => new Promise(res => setTimeout(res, ms));

async function startProcess() {

  const status = document.getElementById("status");
  const tableBody = document.getElementById("tableBody");
  const totalEl = document.getElementById("total");

  tableBody.innerHTML = "";
  totalEl.innerText = "";

  let uniqueMap = new Map();

  try {

    for (let i = 0; i < 10; i++) {
      status.innerText = `Fetching poll ${i}/9...`;

      const res = await fetch(`${BASE_URL}/quiz/messages?regNo=${REG_NO}&poll=${i}`);
      const data = await res.json();

      data.events.forEach(e => {
        const key = `${e.roundId}_${e.participant}`;

        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, e);
        }
      });

      await delay(5000); // required delay
    }

    status.innerText = "Processing leaderboard...";

    let scoreMap = {};

    uniqueMap.forEach(e => {
      scoreMap[e.participant] =
        (scoreMap[e.participant] || 0) + e.score;
    });

    let leaderboard = Object.entries(scoreMap).map(([participant, totalScore]) => ({
      participant,
      totalScore
    }));

    leaderboard.sort((a, b) => b.totalScore - a.totalScore);

    leaderboard.forEach((p, i) => {
      let medal = "";
      if (i === 0) medal = "🥇";
      else if (i === 1) medal = "🥈";
      else if (i === 2) medal = "🥉";

      const row = `
        <tr class="border-b hover:bg-gray-50">
          <td class="p-3">${medal || i + 1}</td>
          <td class="p-3">${p.participant}</td>
          <td class="p-3 text-right font-semibold">${p.totalScore}</td>
        </tr>
      `;

      tableBody.innerHTML += row;
    });

    const totalScore = leaderboard.reduce((sum, p) => sum + p.totalScore, 0);
    totalEl.innerText = totalScore;

    status.innerText = "✅ Completed Successfully!";

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Error occurred. Check REG_NO or internet.";
  }
}

</script>

</body>
</html>
